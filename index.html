<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Meu Portfólio</title>

  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .container {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      font-size: 50px;
      margin: 0;
    }

    p {
      color: #aaa;
      margin-top: 10px;
    }

    button {
      margin-top: 20px;
      padding: 12px 24px;
      background: transparent;
      border: 1px solid white;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: white;
      color: black;
    }

    .section {
      padding: 80px 20px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Seu Nome</h1>
    <p>AI & Software Engineer</p>
    <button onclick="scrollToProjects()">Ver Projetos</button>
  </div>

  <div id="projects" class="section">
    <h2>Meus Projetos</h2>

    <p>
      <a href="projeto1.pdf" target="_blank">📄 Projeto 1</a>
    </p>

    <p>
      <a href="projeto2.pdf" target="_blank">📄 Projeto 2</a>
    </p>
  </div>

  <script>
    function scrollToProjects() {
      document.getElementById("projects").scrollIntoView({
        behavior: "smooth"
      });
    }
  </script>

</body>
</html>
