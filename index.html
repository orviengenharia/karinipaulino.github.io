<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Karini Paulino</title>

  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: white;
      font-family: Arial, sans-serif;
      scroll-behavior: smooth;
    }

    header {
      position: fixed;
      width: 100%;
      top: 0;
      background: rgba(0,0,0,0.8);
      padding: 15px;
      text-align: center;
    }

    header a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-size: 14px;
    }

    .container {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    h1 {
      font-size: 60px;
      margin: 0;
    }

    p {
      color: #aaa;
      font-size: 18px;
    }

    button {
      margin-top: 20px;
      padding: 12px 24px;
      background: transparent;
      border: 1px solid white;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: white;
      color: black;
    }

    .section {
      padding: 100px 20px;
      text-align: center;
    }
  </style>
</head>

<body>

  <header>
    <a href="#home">Home</a>
    <a href="#about">Sobre</a>
    <a href="#projects">Projetos</a>
  </header>

  <div id="home" class="container">
    <h1>Karini Paulino</h1>
    <p>Projetista de Instalações Elétricas</p>
    <button onclick="goToProjects()">Ver Projetos</button>
  </div>

  <div id="about" class="section">
    <h2>Sobre</h2>
    <p>
      Sou projetista de instalações elétricas, focada em criar soluções seguras, eficientes e bem planejadas.
    </p>
  </div>

  <div id="projects" class="section">
    <h2>Projetos</h2>
    <p>Em breve você poderá ver meus projetos aqui.</p>
  </div>

  <script>
    function goToProjects() {
      document.getElementById("projects").scrollIntoView({
        behavior: "smooth"
      });
    }
  </script>

</body>
</html>
